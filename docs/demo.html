<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Traveler Weather Clock 2.0 Demo</title>
  <meta name="description" content="Traveler Weather Clock 2.0 demo video player.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #061023;
      --card: rgba(9, 24, 52, 0.82);
      --line: rgba(150, 205, 255, 0.22);
      --text: #f7fbff;
      --muted: #a9c5df;
      --blue: #39d8ff;
      --gold: #ffd66b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 22% 16%, rgba(57, 216, 255, 0.28), transparent 28%),
        radial-gradient(circle at 80% 18%, rgba(255, 214, 107, 0.22), transparent 24%),
        linear-gradient(135deg, #030711 0%, #071a38 48%, #0e1233 100%);
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .shell {
      width: min(1080px, 100%);
    }

    .hero {
      text-align: center;
      margin-bottom: 18px;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: clamp(14px, 2.2vw, 18px);
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 7vw, 68px);
      letter-spacing: -0.05em;
      line-height: 1.02;
    }

    h1 span {
      background: linear-gradient(90deg, #fff7dd, var(--blue), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .player {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    video {
      display: block;
      width: 100%;
      height: auto;
      background: #000;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      padding: 18px;
      border-top: 1px solid var(--line);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-weight: 700;
    }

    .button.primary {
      background: linear-gradient(90deg, #1da7ff, #36e1ff);
      color: #02101f;
      border-color: transparent;
    }

    .note {
      margin-top: 14px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>Traveler <span>Weather</span> Clock 2.0</h1>
      <p>ESP32-S3 旅行天气时钟 · 演示视频</p>
    </section>

    <section class="player">
      <video controls playsinline preload="metadata" poster="./assets/demo-cover.jpg">
        <source src="./assets/demo.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
      </video>

      <div class="actions">
        <a class="button primary" href="./assets/demo.mp4">直接打开 MP4</a>
        <a class="button" href="https://github.com/pullead/Traveler-Weather-Clock">返回 GitHub 项目</a>
        <a class="button" href="https://github.com/pullead/Traveler-Weather-Clock/raw/refs/heads/main/docs/assets/demo.mp4">下载备用视频</a>
      </div>
    </section>

    <p class="note">如果 GitHub Pages 首次打开较慢，请刷新一次；视频文件约 3.6MB。</p>
  </main>
</body>
</html>
